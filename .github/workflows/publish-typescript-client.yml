name: Publish TypeScript Client

on:
  push:
    paths:
      - 'typescript-client/**'
    branches:
      - master
  workflow_dispatch:
    inputs:
      spec_url:
        description: 'URL to download OpenAPI spec from (leave blank to use production API)'
        required: false
        default: ''

permissions:
  contents: read
  id-token: write  # Required for trusted publishing with OIDC

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download OpenAPI Spec
        run: |
          SPEC_URL="${{ inputs.spec_url }}"
          if [ -z "$SPEC_URL" ]; then
            SPEC_URL="https://api.smsh.sh/docs/openapi"
            echo "No spec_url provided, downloading from production API"
          else
            echo "Downloading spec from custom URL"
          fi
          curl -fL -o openapi.yml "$SPEC_URL"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Remove deprecated npm config
        run: npm config delete always-auth

      - name: Install OpenAPI Generator CLI
        run: npm install -g @openapitools/openapi-generator-cli

      - name: Extract API Version
        id: version
        run: |
          API_VERSION=$(grep 'version:' openapi.yml | head -1 | awk '{print $2}' | tr -d '"')
          echo "version=$API_VERSION" >> $GITHUB_OUTPUT
          echo "Extracted API version: $API_VERSION"

      - name: Generate TypeScript Client
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          openapi-generator-cli generate \
            -i openapi.yml \
            -g typescript-axios \
            -o typescript-client \
            --additional-properties=npmName=@rebornteam/reborn-api,npmVersion=$VERSION,supportsES6=true,gitUserId=Smash-Reborn,gitRepoId=Reborn-API-Clients

      - name: Fix package.json
        working-directory: ./typescript-client
        run: |
          npm pkg set repository.url="git+https://github.com/Smash-Reborn/Reborn-API-Clients.git"
          npm pkg fix

      - name: Install dependencies
        working-directory: ./typescript-client
        run: npm install

      - name: Build TypeScript client
        working-directory: ./typescript-client
        run: npm run build

      - name: Publish to NPM with provenance
        working-directory: ./typescript-client
        run: npm publish --provenance --access public

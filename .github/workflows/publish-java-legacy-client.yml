name: Publish Java Legacy Client

on:
  push:
    paths:
      - 'java-legacy-client/**'
      - 'scripts/**'
    branches:
      - master
  workflow_dispatch:
    inputs:
      spec_url:
        description: 'URL to download OpenAPI spec from (leave blank to use production API)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download OpenAPI Spec
        run: |
          SPEC_URL="${{ inputs.spec_url }}"
          if [ -z "$SPEC_URL" ]; then
            SPEC_URL="https://api.smsh.sh/docs/openapi"
            echo "No spec_url provided, downloading from production API"
          else
            echo "Downloading spec from custom URL"
          fi
          curl -fL -o openapi.yml "$SPEC_URL"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'

      - name: Setup Node.js (for OpenAPI Generator CLI)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install OpenAPI Generator CLI
        run: npm install -g @openapitools/openapi-generator-cli

      - name: Extract API Version
        id: version
        run: |
          API_VERSION=$(grep -oP 'version:\s*\K[^#\n]*' openapi.yml | tr -d ' "'"'")
          echo "version=$API_VERSION" >> $GITHUB_OUTPUT
          echo "Extracted API version: $API_VERSION"

      - name: Generate Java Legacy Client
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          openapi-generator-cli generate \
            -i openapi.yml \
            -g java \
            -o java-legacy-client \
            --library rest-assured \
            --api-package sh.smsh.client.api \
            --model-package sh.smsh.client.model \
            --invoker-package sh.smsh.client \
            --group-id sh.smsh \
            --artifact-id reborn-api \
            --artifact-version "$VERSION-legacy" \
            --additional-properties=dateLibrary=java8,useRuntimeException=true,hideGenerationTimestamp=true,supportUrlQuery=true

      - name: Patch generated POM with publishing config
        run: |
          python3 scripts/patch-pom.py \
            java-legacy-client/pom.xml \
            "Reborn API Client (Legacy)" \
            "Java client for Reborn API (Java 8 Compatible)" \
            --legacy


      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d | gpg --batch --import
          gpg --list-secret-keys --keyid-format LONG

      - name: Create Maven settings.xml
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'EOF'
          <settings>
            <servers>
              <server>
                <id>central</id>
                <username>${env.MVN_CENTRAL_USERNAME}</username>
                <password>${env.MVN_CENTRAL_PASSWORD}</password>
              </server>
            </servers>
          </settings>
          EOF

      - name: Build and Publish to Maven Central
        working-directory: ./java-legacy-client
        env:
          MVN_CENTRAL_USERNAME: ${{ secrets.MVN_CENTRAL_USERNAME }}
          MVN_CENTRAL_PASSWORD: ${{ secrets.MVN_CENTRAL_PASSWORD }}
        run: |
          mvn clean deploy -Dgpg.keyname=${{ secrets.GPG_KEY_ID }}
